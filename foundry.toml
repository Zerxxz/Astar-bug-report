[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.19"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
astar = "${ASTAR_RPC_URL:-https://rpc.astar.network}"
shiden = "${SHIDEN_RPC_URL:-https://rpc.shiden.astar.network}"

[etherscan]
astar = { key = "${ASTARSCAN_API_KEY}" }